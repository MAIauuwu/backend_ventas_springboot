name: CI/CD - Ventas Innovatech

on:
  push:
    branches:
      - deploy

jobs:
  build-and-push:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Login en docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        
      - name: Build y push imagen docker
        uses: docker/build-push-action@v5
        with:
          context: ./Springboot-API-REST
          file: ./Springboot-API-REST/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ventas-backend:latest

      - name: Deploy en EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 10.0.2.244
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          proxy_host: ${{ secrets.EC2_HOST }}
          proxy_username: ec2-user
          proxy_key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/back-ventas/Springboot-API-REST
            docker compose pull
            docker compose up -d --force-recreate
            docker image prune -f
